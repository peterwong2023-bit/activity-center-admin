<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 活动中心管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══ Global Variables ══ */
        :root, [data-theme="dark"] {
            --bg-base: #030712;
            --bg-surface: rgba(15, 23, 42, 0.6);
            --bg-input: rgba(30, 41, 59, 0.5);
            --bg-input-hover: rgba(30, 41, 59, 0.8);
            --bg-input-focus: rgba(15, 23, 42, 0.9);
            
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-tertiary: #64748b;
            
            --border-subtle: rgba(255, 255, 255, 0.08);
            --border-input: rgba(255, 255, 255, 0.12);
            --border-focus: #3b82f6;
            
            --brand-primary: #3b82f6;
            --brand-gradient: linear-gradient(135deg, #60a5fa 0%, #3b82f6 100%);
            --brand-glow: rgba(59, 130, 246, 0.4);
            
            --shadow-card: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-focus: 0 0 0 4px rgba(59, 130, 246, 0.15);
            --shadow-inner: inset 0 1px 0 0 rgba(255, 255, 255, 0.05);
            
            --captcha-bg: #0f172a;
            --grid-color: rgba(255, 255, 255, 0.02);
        }

        [data-theme="light"] {
            --bg-base: #f8fafc;
            --bg-surface: #ffffff;
            --bg-input: #f1f5f9;
            --bg-input-hover: #e2e8f0;
            --bg-input-focus: #ffffff;
            
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-tertiary: #94a3b8;
            
            --border-subtle: #e2e8f0;
            --border-input: #cbd5e1;
            --border-focus: #3b82f6;
            
            --brand-primary: #3b82f6;
            --brand-gradient: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            --brand-glow: rgba(59, 130, 246, 0.3);
            
            --shadow-card: 0 20px 40px -10px rgba(0, 0, 0, 0.05), 0 1px 3px rgba(0,0,0,0.05);
            --shadow-focus: 0 0 0 4px rgba(59, 130, 246, 0.15);
            --shadow-inner: inset 0 1px 0 0 rgba(255, 255, 255, 1);
            
            --captcha-bg: #f8fafc;
            --grid-color: rgba(0, 0, 0, 0.02);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background-color 0.4s ease;
        }

        /* ══ Background Elements ══ */
        .bg-grid {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            background-image: 
                linear-gradient(to right, var(--grid-color) 1px, transparent 1px),
                linear-gradient(to bottom, var(--grid-color) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
            -webkit-mask-image: radial-gradient(circle at center, black 30%, transparent 80%);
        }

        .bg-glows {
            position: absolute; inset: 0; z-index: 0; pointer-events: none;
            overflow: hidden;
        }
        
        .glow {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s ease-in-out infinite alternate;
        }
        
        [data-theme="light"] .glow { opacity: 0.3; filter: blur(60px); }

        .glow-1 {
            width: 400px; height: 400px;
            background: rgba(59, 130, 246, 0.4);
            top: -100px; left: -100px;
        }
        
        .glow-2 {
            width: 300px; height: 300px;
            background: rgba(168, 85, 247, 0.3);
            bottom: -50px; right: -50px;
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        /* ══ Theme Toggle ══ */
        .theme-toggle {
            position: fixed; top: 24px; right: 24px; z-index: 100;
            width: 40px; height: 40px; border-radius: 50%;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            font-size: 16px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .theme-toggle:hover {
            color: var(--text-primary);
            transform: scale(1.05);
            border-color: var(--text-tertiary);
        }

        /* ══ Main Layout ══ */
        .container {
            position: relative; z-index: 10;
            display: flex;
            width: 100%; max-width: 1080px;
            height: 600px;
            margin: 0 24px;
            background: var(--bg-surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border-subtle);
            border-radius: 24px;
            box-shadow: var(--shadow-card), var(--shadow-inner);
            overflow: hidden;
            animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ══ Left Side: Brand ══ */
        .brand-section {
            flex: 1;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border-right: 1px solid var(--border-subtle);
            position: relative;
            background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.02) 100%);
        }

        .brand-header {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-box {
            width: 48px; height: 48px;
            border-radius: 12px;
            background: var(--brand-gradient);
            display: flex; align-items: center; justify-content: center;
            color: white;
            box-shadow: 0 4px 12px var(--brand-glow), inset 0 1px 0 rgba(255,255,255,0.3);
        }

        .logo-box svg { width: 24px; height: 24px; }

        .brand-text h1 {
            font-size: 24px; font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }
        .brand-text p {
            font-size: 12px; color: var(--text-tertiary);
            text-transform: uppercase; letter-spacing: 1.5px;
            font-weight: 600;
        }

        .brand-content { margin-top: auto; margin-bottom: 20px; }

        .slogan {
            font-size: 32px; font-weight: 700;
            line-height: 1.2; margin-bottom: 16px;
            letter-spacing: -0.5px;
        }
        .slogan-highlight {
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sub-slogan {
            font-size: 15px; color: var(--text-secondary);
            line-height: 1.6; margin-bottom: 40px;
            max-width: 360px;
        }

        .feature-list {
            display: flex; flex-direction: column; gap: 20px;
        }
        .feature-item {
            display: flex; align-items: center; gap: 16px;
        }
        .feature-icon {
            width: 40px; height: 40px; border-radius: 10px;
            background: rgba(59, 130, 246, 0.1);
            color: var(--brand-primary);
            display: flex; align-items: center; justify-content: center;
            font-size: 16px;
        }
        [data-theme="light"] .feature-icon { background: #eff6ff; }
        
        .feature-text h3 {
            font-size: 14px; font-weight: 600; color: var(--text-primary);
            margin-bottom: 2px;
        }
        .feature-text p {
            font-size: 13px; color: var(--text-secondary);
        }

        /* ══ Right Side: Form ══ */
        .form-section {
            width: 480px;
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--bg-base);
        }

        .form-header { margin-bottom: 32px; }
        .form-header h2 {
            font-size: 24px; font-weight: 600;
            margin-bottom: 8px; letter-spacing: -0.3px;
        }
        .form-header p {
            font-size: 14px; color: var(--text-secondary);
        }

        .alert {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            padding: 12px 16px; border-radius: 8px;
            font-size: 13px; margin-bottom: 24px;
            display: none; align-items: center; gap: 10px;
            animation: shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        .alert.show { display: flex; }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-3px, 0, 0); }
            40%, 60% { transform: translate3d(3px, 0, 0); }
        }

        .form-group { margin-bottom: 20px; }
        
        .form-label {
            display: block; font-size: 13px; font-weight: 500;
            color: var(--text-primary); margin-bottom: 8px;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        
        .input-icon {
            position: absolute; left: 16px;
            color: var(--text-tertiary); font-size: 14px;
            pointer-events: none; transition: color 0.2s;
        }

        .form-input {
            width: 100%; height: 48px;
            padding: 0 16px 0 44px;
            background: var(--bg-input);
            border: 1px solid var(--border-input);
            border-radius: 12px;
            font-size: 14px; color: var(--text-primary);
            font-family: inherit;
            transition: all 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.02);
        }

        .form-input:hover { border-color: var(--text-tertiary); }
        .form-input:focus {
            outline: none;
            background: var(--bg-input-focus);
            border-color: var(--border-focus);
            box-shadow: var(--shadow-focus);
        }
        .form-input::placeholder { color: var(--text-placeholder); }
        .input-wrapper:focus-within .input-icon { color: var(--brand-primary); }

        .btn-toggle-pwd {
            position: absolute; right: 12px;
            background: none; border: none;
            color: var(--text-tertiary); cursor: pointer;
            padding: 4px; font-size: 14px; transition: color 0.2s;
        }
        .btn-toggle-pwd:hover { color: var(--text-primary); }

        .captcha-wrapper { display: flex; gap: 12px; }
        .captcha-wrapper .input-wrapper { flex: 1; }
        .captcha-img {
            width: 120px; height: 48px;
            border-radius: 12px;
            border: 1px solid var(--border-input);
            background: var(--captcha-bg);
            cursor: pointer; overflow: hidden;
            transition: border-color 0.2s;
            position: relative; flex-shrink: 0;
        }
        .captcha-img:hover { border-color: var(--text-tertiary); }
        .captcha-img canvas { width: 100%; height: 100%; display: block; }

        .ip-info {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 24px; font-size: 12px; color: var(--text-tertiary);
        }
        .ip-info-left { display: flex; align-items: center; gap: 6px; }
        .ip-value { font-family: 'SF Mono', ui-monospace, monospace; color: var(--text-secondary); }

        .btn-submit {
            width: 100%; height: 48px;
            background: var(--brand-gradient);
            border: none; border-radius: 12px;
            color: white; font-size: 15px; font-weight: 600;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: var(--shadow-btn), inset 0 1px 0 rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            position: relative; overflow: hidden;
        }
        
        .btn-submit::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(rgba(255,255,255,0.1), transparent);
            opacity: 0; transition: opacity 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-btn-hover), inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .btn-submit:hover::after { opacity: 1; }
        .btn-submit:active { transform: translateY(0); box-shadow: var(--shadow-btn); }
        
        .btn-submit.loading { pointer-events: none; opacity: 0.9; }
        .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .footer {
            margin-top: auto; text-align: center;
            font-size: 12px; color: var(--text-tertiary);
            padding-top: 32px;
        }

        /* ══ Responsive ══ */
        @media (max-width: 960px) {
            .container { height: auto; min-height: 540px; margin: 24px; }
            .brand-section { padding: 40px 32px; }
            .form-section { width: 400px; padding: 40px 32px; }
            .slogan { font-size: 26px; }
        }
        @media (max-width: 768px) {
            .container { flex-direction: column; width: 100%; max-width: 440px; }
            .brand-section { display: none; }
            .form-section { width: 100%; padding: 40px 32px; border-radius: 24px; }
        }
        @media (max-width: 480px) {
            .container { margin: 16px; border-radius: 20px; }
            .form-section { padding: 32px 24px; }
        }
    </style>
</head>
<body>

    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="bg-grid"></div>
    <div class="bg-glows">
        <div class="glow glow-1"></div>
        <div class="glow glow-2"></div>
    </div>

    <div class="container">
        <!-- Left Brand -->
        <div class="brand-section">
            <div class="brand-header">
                <div class="logo-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
                    </svg>
                </div>
                <div class="brand-text">
                    <h1>活动中心</h1>
                    <p>Campaign Center</p>
                </div>
            </div>

            <div class="brand-content">
                <h2 class="slogan">智能活动营销平台<br><span class="slogan-highlight">驱动业务高效增长</span></h2>
                <p class="sub-slogan">提供丰富活动玩法、精准用户触达及全链路数据分析，助力商户降低成本，提升转化收益。</p>
                
                <div class="feature-list">
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-layer-group"></i></div>
                        <div class="feature-text">
                            <h3>高效活动配置</h3>
                            <p>内置海量模板，分钟级搭建上线</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-bullseye"></i></div>
                        <div class="feature-text">
                            <h3>精准用户触达</h3>
                            <p>智能分群画像，千人千面精准营销</p>
                        </div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon"><i class="fas fa-chart-pie"></i></div>
                        <div class="feature-text">
                            <h3>数据驱动洞察</h3>
                            <p>实时转化漏斗，持续优化投资回报</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Form -->
        <div class="form-section">
            <div class="form-header">
                <h2>账号登录</h2>
                <p>请输入您的管理员凭证以继续访问</p>
            </div>

            <div class="alert" id="errorMsg">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText"></span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="form-group">
                    <label class="form-label">邮箱地址</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" class="form-input" id="email" placeholder="admin@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">登录密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password" class="form-input" id="password" placeholder="••••••••" required>
                        <button type="button" class="btn-toggle-pwd" onclick="togglePassword()" tabindex="-1">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="captcha-wrapper">
                        <div class="input-wrapper">
                            <i class="fas fa-shield-alt input-icon"></i>
                            <input type="text" class="form-input" id="captcha" placeholder="输入右侧字符" maxlength="4" required autocomplete="off">
                        </div>
                        <div class="captcha-img" onclick="generateCaptcha()" title="点击刷新">
                            <canvas id="captchaCanvas" width="120" height="48"></canvas>
                        </div>
                    </div>
                </div>

                <div class="ip-info">
                    <div class="ip-info-left">
                        <i class="fas fa-globe"></i>
                        <span>安全环境检测中</span>
                    </div>
                    <span class="ip-value" id="currentIP">...</span>
                </div>

                <button type="submit" class="btn-submit" id="loginBtn">
                    <span>立即登录</span>
                    <i class="fas fa-arrow-right" style="font-size: 12px; margin-left: 4px;"></i>
                </button>
            </form>
            
            <div class="footer">
                &copy; 2026 活动中心 Campaign Center. All rights reserved.
            </div>
        </div>
    </div>

    <script>
        let currentCaptcha = '';

        // ── Theme Management ──
        function initTheme() {
            const saved = localStorage.getItem('ac-theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = saved || (prefersDark ? 'dark' : 'light');
            applyTheme(theme);
        }

        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            applyTheme(current === 'dark' ? 'light' : 'dark');
        }

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('ac-theme', theme);
            document.getElementById('themeIcon').className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            generateCaptcha(); // Redraw captcha with new theme colors
        }

        // ── Password Toggle ──
        function togglePassword() {
            const input = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fas fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fas fa-eye';
            }
        }

        // ── IP Fetching ──
        async function fetchIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                document.getElementById('currentIP').textContent = data.ip;
            } catch (error) {
                document.getElementById('currentIP').textContent = 'Unreachable';
            }
        }

        // ── Captcha Generation ──
        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            
            currentCaptcha = '';
            ctx.clearRect(0, 0, 120, 48);

            // Draw chars
            for (let i = 0; i < 4; i++) {
                const char = chars.charAt(Math.floor(Math.random() * chars.length));
                currentCaptcha += char;
                
                const fontSize = 20 + Math.random() * 4;
                ctx.font = `bold ${fontSize}px 'Plus Jakarta Sans', sans-serif`;
                
                // Color variation based on theme
                if (isDark) {
                    ctx.fillStyle = `hsl(${210 + Math.random()*40}, 80%, 70%)`;
                } else {
                    ctx.fillStyle = `hsl(${210 + Math.random()*40}, 70%, 40%)`;
                }
                
                ctx.save();
                ctx.translate(15 + i * 25, 28 + (Math.random() - 0.5) * 6);
                ctx.rotate((Math.random() - 0.5) * 0.4);
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }

            // Draw noise lines
            for (let i = 0; i < 4; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 120, Math.random() * 48);
                ctx.lineTo(Math.random() * 120, Math.random() * 48);
                ctx.strokeStyle = isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
            
            // Draw noise dots
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)';
                ctx.fillRect(Math.random() * 120, Math.random() * 48, 2, 2);
            }
        }

        // ── Form Submission ──
        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const alertBox = document.getElementById('errorMsg');
            const alertText = document.getElementById('errorText');
            const inputCaptcha = document.getElementById('captcha').value;

            // Reset state
            alertBox.classList.remove('show');
            alertBox.style.animation = 'none';
            alertBox.offsetHeight; // trigger reflow

            if (inputCaptcha.toLowerCase() !== currentCaptcha.toLowerCase()) {
                alertText.textContent = '验证码输入错误，请重新输入';
                alertBox.classList.add('show');
                alertBox.style.animation = 'shake 0.4s cubic-bezier(0.36, 0.07, 0.19, 0.97) both';
                generateCaptcha();
                document.getElementById('captcha').value = '';
                document.getElementById('captcha').focus();
                return;
            }

            // Loading state
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner"></div><span>验证中...</span>';

            // Simulate API Call
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }

        // ── Initialization ──
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            fetchIP();
            document.getElementById('email').focus();
        });
    </script>
</body>
</html>
