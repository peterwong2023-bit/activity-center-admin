<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 活动中心管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary-color: #4f6ef7;
            --primary-hover: #3b5bdb;
            --primary-light: #eef2ff;
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #4f6ef7 50%, #3b5bdb 100%);
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            --border-light: #e2e8f0;
            --bg-primary: #f0f2f5;
            --surface: #ffffff;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --shadow-sm: 0 2px 4px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
            --shadow-md: 0 8px 24px rgba(0,0,0,0.06), 0 4px 8px rgba(0,0,0,0.03);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.08), 0 8px 16px rgba(0,0,0,0.04);
            --radius: 8px;
            --radius-lg: 12px;
            --radius-xl: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-wrapper {
            width: 960px;
            min-height: 560px;
            display: flex;
            background: var(--surface);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ===== Left Brand Panel ===== */
        .login-brand {
            width: 400px;
            background: var(--primary-gradient);
            padding: 60px 48px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .login-brand::before {
            content: '';
            position: absolute;
            top: -80px;
            right: -80px;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }

        .login-brand::after {
            content: '';
            position: absolute;
            bottom: -60px;
            left: -40px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .brand-content {
            position: relative;
            z-index: 1;
        }

        .brand-logo {
            width: 56px;
            height: 56px;
            background: rgba(255,255,255,0.2);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
        }

        .brand-title {
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .brand-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 36px;
        }

        .brand-features {
            list-style: none;
        }

        .brand-features li {
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255,255,255,0.9);
            font-size: 14px;
            margin-bottom: 18px;
        }

        .brand-features li i {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            flex-shrink: 0;
        }

        .brand-footer {
            position: relative;
            z-index: 1;
            color: rgba(255,255,255,0.5);
            font-size: 12px;
        }

        /* ===== Right Form Panel ===== */
        .login-form-panel {
            flex: 1;
            padding: 60px 56px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .form-header {
            margin-bottom: 36px;
        }

        .form-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .form-header p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .error-message {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 8px;
        }

        .error-message.show { display: flex; }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-tertiary);
            font-size: 15px;
            pointer-events: none;
            transition: color 0.2s;
        }

        .form-input {
            width: 100%;
            height: 44px;
            padding: 0 12px 0 40px;
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            font-size: 14px;
            color: var(--text-primary);
            background: var(--surface);
            transition: all 0.2s;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.08);
        }

        .input-wrapper:focus-within .input-icon {
            color: var(--primary-color);
        }

        .form-input::placeholder { color: #cbd5e1; }

        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-tertiary);
            cursor: pointer;
            padding: 4px;
            font-size: 15px;
            transition: color 0.2s;
        }

        .password-toggle:hover { color: var(--primary-color); }

        /* ===== Captcha ===== */
        .captcha-row {
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .captcha-row .input-wrapper {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 44px;
            border-radius: var(--radius);
            cursor: pointer;
            overflow: hidden;
            border: 1px solid var(--border-light);
            flex-shrink: 0;
            position: relative;
            background: var(--gray-50);
        }

        .captcha-image canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .captcha-image:hover::after {
            content: '点击刷新';
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            color: #fff;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
        }

        /* ===== IP Display ===== */
        .ip-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--gray-50);
            border-radius: var(--radius);
            margin-bottom: 24px;
            border: 1px solid var(--border-light);
        }

        .ip-info i {
            color: var(--text-tertiary);
            font-size: 14px;
        }

        .ip-info span {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .ip-info .ip-address {
            color: var(--text-primary);
            font-weight: 500;
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
        }

        /* ===== Button ===== */
        .btn-login {
            width: 100%;
            height: 44px;
            background: var(--primary-gradient);
            border: none;
            border-radius: var(--radius);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(79, 110, 247, 0.25);
            margin-bottom: 16px;
        }

        .btn-login:hover {
            box-shadow: 0 4px 16px rgba(79, 110, 247, 0.35);
            transform: translateY(-1px);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login.loading {
            pointer-events: none;
            opacity: 0.8;
        }

        .btn-login .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .form-footer {
            text-align: center;
            font-size: 13px;
            color: var(--text-tertiary);
        }

        @media (max-width: 768px) {
            body { padding: 16px; }

            .login-wrapper {
                width: 100%;
                max-width: 440px;
                flex-direction: column;
                min-height: auto;
            }

            .login-brand {
                width: 100%;
                padding: 36px 32px;
                min-height: auto;
            }

            .brand-features { display: none; }

            .login-form-panel {
                padding: 36px 32px;
            }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Brand Panel -->
        <div class="login-brand">
            <div class="brand-content">
                <div class="brand-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="7" height="7" rx="2" fill="#fff"/>
                        <rect x="14" y="3" width="7" height="7" rx="2" fill="#fff" opacity="0.7"/>
                        <rect x="3" y="14" width="7" height="7" rx="2" fill="#fff" opacity="0.7"/>
                        <rect x="14" y="14" width="7" height="7" rx="2" fill="#fff" opacity="0.5"/>
                    </svg>
                </div>
                <h1 class="brand-title">活动中心</h1>
                <p class="brand-subtitle">Campaign Center</p>

                <ul class="brand-features">
                    <li>
                        <i class="fas fa-layer-group"></i>
                        <span>多平台活动统一管理</span>
                    </li>
                    <li>
                        <i class="fas fa-chart-line"></i>
                        <span>实时数据分析与监控</span>
                    </li>
                    <li>
                        <i class="fas fa-shield-alt"></i>
                        <span>完整的权限与审核体系</span>
                    </li>
                    <li>
                        <i class="fas fa-cogs"></i>
                        <span>灵活的活动配置引擎</span>
                    </li>
                </ul>
            </div>

            <div class="brand-footer">
                © 2026 活动中心管理系统 · 版权所有
            </div>
        </div>

        <!-- Right Form Panel -->
        <div class="login-form-panel">
            <div class="form-header">
                <h2>账号登录</h2>
                <p>请输入您的账号信息登录管理后台</p>
            </div>

            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">邮箱或密码错误，请重试</span>
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                <div class="form-group">
                    <label class="form-label">邮箱地址</label>
                    <div class="input-wrapper">
                        <input type="email" class="form-input" id="email" placeholder="请输入邮箱地址" required>
                        <i class="fas fa-envelope input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">登录密码</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-input" id="password" placeholder="请输入登录密码" required>
                        <i class="fas fa-lock input-icon"></i>
                        <button type="button" class="password-toggle" onclick="togglePassword()">
                            <i class="fas fa-eye" id="toggleIcon"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">验证码</label>
                    <div class="captcha-row">
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" maxlength="4" required autocomplete="off">
                            <i class="fas fa-shield-alt input-icon"></i>
                        </div>
                        <div class="captcha-image" id="captchaImage" onclick="generateCaptcha()" title="点击刷新验证码">
                            <canvas id="captchaCanvas" width="120" height="44"></canvas>
                        </div>
                    </div>
                </div>

                <div class="ip-info">
                    <i class="fas fa-globe"></i>
                    <span>当前IP：<span class="ip-address" id="currentIP">获取中...</span></span>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>登 录</span>
                </button>
            </form>

            <div class="form-footer">
                如需帮助，请联系系统管理员
            </div>
        </div>
    </div>

    <script>
        let captchaCode = '';

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            captchaCode = '';

            canvas.width = 120;
            canvas.height = 44;

            ctx.fillStyle = '#f0f2f5';
            ctx.fillRect(0, 0, 120, 44);

            for (let i = 0; i < 4; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                captchaCode += char;

                ctx.font = `${600 + Math.random() * 100} ${20 + Math.random() * 4}px -apple-system, sans-serif`;
                ctx.fillStyle = `hsl(${Math.random() * 360}, 50%, 40%)`;

                ctx.save();
                const x = 14 + i * 26;
                const y = 28 + Math.random() * 6 - 3;
                ctx.translate(x, y);
                ctx.rotate((Math.random() - 0.5) * 0.4);
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }

            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 120, Math.random() * 44);
                ctx.lineTo(Math.random() * 120, Math.random() * 44);
                ctx.strokeStyle = `rgba(${Math.random()*150}, ${Math.random()*150}, ${Math.random()*150}, 0.3)`;
                ctx.lineWidth = 1;
                ctx.stroke();
            }

            for (let i = 0; i < 40; i++) {
                ctx.fillStyle = `rgba(${Math.random()*200}, ${Math.random()*200}, ${Math.random()*200}, 0.4)`;
                ctx.fillRect(Math.random() * 120, Math.random() * 44, 2, 2);
            }
        }

        function fetchIP() {
            fetch('https://api.ipify.org?format=json')
                .then(res => res.json())
                .then(data => {
                    document.getElementById('currentIP').textContent = data.ip;
                })
                .catch(() => {
                    document.getElementById('currentIP').textContent = '无法获取';
                });
        }

        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('toggleIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }

        function handleLogin(e) {
            e.preventDefault();

            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const captchaInput = document.getElementById('captcha').value;

            errorMsg.classList.remove('show');

            if (captchaInput.toLowerCase() !== captchaCode.toLowerCase()) {
                errorText.textContent = '验证码错误，请重新输入';
                errorMsg.classList.add('show');
                generateCaptcha();
                document.getElementById('captcha').value = '';
                document.getElementById('captcha').focus();
                return;
            }

            loginBtn.classList.add('loading');
            loginBtn.innerHTML = '<div class="spinner"></div><span>登录中...</span>';

            setTimeout(() => {
                if (email && password) {
                    window.location.href = 'dashboard.html';
                } else {
                    errorText.textContent = '邮箱或密码错误，请重试';
                    errorMsg.classList.add('show');
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = '<span>登 录</span>';
                    generateCaptcha();
                }
            }, 1500);
        }

        generateCaptcha();
        fetchIP();
        document.getElementById('email').focus();
    </script>
</body>
</html>
