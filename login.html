<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 活动中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══ Dark ══ */
        :root, [data-theme="dark"] {
            --bg-page: #060e1f;
            --bg-card: rgba(13, 21, 42, 0.75);
            --bg-input: rgba(15, 23, 42, 0.6);
            --bg-input-hover: rgba(15, 23, 42, 0.8);
            --bg-ip: rgba(15, 23, 42, 0.5);
            --text-1: #f1f5f9;
            --text-2: rgba(148, 163, 184, 0.7);
            --text-3: rgba(148, 163, 184, 0.4);
            --text-placeholder: rgba(148, 163, 184, 0.3);
            --primary: #4f6ef7;
            --primary-rgb: 79, 110, 247;
            --accent-rgb: 96, 165, 250;
            --accent2-rgb: 34, 211, 238;
            --accent3-rgb: 167, 139, 250;
            --border-card: rgba(79, 110, 247, 0.1);
            --border-input: rgba(79, 110, 247, 0.15);
            --border-input-focus: rgba(79, 110, 247, 0.5);
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.4);
            --shadow-btn: 0 4px 20px rgba(79, 110, 247, 0.25);
            --shadow-btn-hover: 0 8px 32px rgba(79, 110, 247, 0.4);
            --shadow-input-focus: 0 0 0 3px rgba(79, 110, 247, 0.08);
            --btn-gradient: linear-gradient(135deg, #3b5bdb 0%, #4f6ef7 50%, #667eea 100%);
            --card-glow: rgba(79, 110, 247, 0.5);
            --card-blur: blur(40px);
            --ip-border: rgba(79, 110, 247, 0.1);
            --footer-color: rgba(148, 163, 184, 0.3);
            --toggle-bg: rgba(255, 255, 255, 0.06);
            --toggle-hover: rgba(255, 255, 255, 0.12);
            --toggle-color: rgba(148, 163, 184, 0.6);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.2);
            --error-text: #f87171;
            --brand-bg: transparent;
            --brand-title: #f1f5f9;
            --brand-sub: rgba(148, 163, 184, 0.5);
            --sell-bg: rgba(79, 110, 247, 0.04);
            --sell-border: rgba(79, 110, 247, 0.08);
            --sell-hover: rgba(79, 110, 247, 0.08);
            --sell-icon1: rgba(96, 165, 250, 0.12);
            --sell-icon2: rgba(34, 211, 238, 0.12);
            --sell-icon3: rgba(167, 139, 250, 0.12);
            --sell-ic1: #60a5fa;
            --sell-ic2: #22d3ee;
            --sell-ic3: #a78bfa;
            --noise: 0.03;
            --captcha-bg: #0d1526;
        }

        /* ══ Light ══ */
        [data-theme="light"] {
            --bg-page: #f0f2f5;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --bg-input-hover: #f1f5f9;
            --bg-ip: #f8fafc;
            --text-1: #1e293b;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --text-placeholder: #cbd5e1;
            --border-card: #e2e8f0;
            --border-input: #e2e8f0;
            --border-input-focus: #4f6ef7;
            --shadow-card: 0 16px 48px rgba(0,0,0,0.08);
            --shadow-btn: 0 4px 16px rgba(79,110,247,0.3);
            --shadow-btn-hover: 0 8px 24px rgba(79,110,247,0.4);
            --shadow-input-focus: 0 0 0 3px rgba(79,110,247,0.1);
            --btn-gradient: linear-gradient(135deg, #667eea 0%, #4f6ef7 50%, #3b5bdb 100%);
            --card-glow: transparent;
            --card-blur: none;
            --ip-border: #e2e8f0;
            --footer-color: #94a3b8;
            --toggle-bg: rgba(0,0,0,0.04);
            --toggle-hover: rgba(0,0,0,0.08);
            --toggle-color: #64748b;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #dc2626;
            --brand-bg: linear-gradient(135deg, #667eea 0%, #4f6ef7 40%, #3b5bdb 100%);
            --brand-title: #ffffff;
            --brand-sub: rgba(255,255,255,0.6);
            --sell-bg: rgba(255,255,255,0.1);
            --sell-border: rgba(255,255,255,0.15);
            --sell-hover: rgba(255,255,255,0.18);
            --sell-icon1: rgba(255,255,255,0.18);
            --sell-icon2: rgba(255,255,255,0.18);
            --sell-icon3: rgba(255,255,255,0.18);
            --sell-ic1: #fff;
            --sell-ic2: #fff;
            --sell-ic3: #fff;
            --noise: 0;
            --captcha-bg: #f0f2f5;
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-page); min-height: 100vh; overflow: hidden;
        }
        .page { position: fixed; inset: 0; display: flex; }

        /* BG */
        .bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .bg-noise {
            position: absolute; inset: 0; opacity: var(--noise);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .bg-glow { position: absolute; border-radius: 50%; filter: blur(100px); animation: gp 10s ease-in-out infinite; }
        .bg-g1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(var(--primary-rgb),0.1) 0%, transparent 70%); top: -10%; left: -5%; }
        .bg-g2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(var(--accent2-rgb),0.06) 0%, transparent 70%); bottom: -5%; right: 5%; animation-delay: -4s; }
        [data-theme="light"] .bg-g1, [data-theme="light"] .bg-g2 { opacity: 0; }
        @keyframes gp { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* Theme Toggle */
        .theme-toggle {
            position: fixed; top: 20px; right: 24px; z-index: 100;
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--toggle-bg); border: none;
            color: var(--toggle-color); font-size: 16px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { background: var(--toggle-hover); color: var(--text-1); }

        /* ══ Left Brand ══ */
        .brand {
            flex: 1 1 0; min-width: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 48px; z-index: 1; position: relative;
            background: var(--brand-bg);
        }
        [data-theme="light"] .brand::before {
            content: ''; position: absolute;
            top: -100px; right: -100px;
            width: 300px; height: 300px; border-radius: 50%;
            background: rgba(255,255,255,0.06);
        }
        [data-theme="light"] .brand::after {
            content: ''; position: absolute;
            bottom: -80px; left: -50px;
            width: 220px; height: 220px; border-radius: 50%;
            background: rgba(255,255,255,0.04);
        }
        .brand-inner {
            display: flex; flex-direction: column; align-items: center;
            max-width: 400px; width: 100%; position: relative; z-index: 1;
            opacity: 0; transform: translateY(16px);
            animation: fadeIn 0.7s ease-out 0.2s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }

        .brand-logo {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 28px;
        }
        [data-theme="dark"] .brand-logo {
            background: rgba(79,110,247,0.1);
            border: 1px solid rgba(79,110,247,0.15);
        }
        [data-theme="light"] .brand-logo {
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(10px);
        }

        .brand-name {
            font-size: 28px; font-weight: 700;
            color: var(--brand-title); margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .brand-en {
            font-size: 12px; font-weight: 400;
            color: var(--brand-sub); text-transform: uppercase;
            letter-spacing: 3px; margin-bottom: 10px;
        }
        .brand-divider {
            width: 32px; height: 2px; border-radius: 1px;
            background: rgba(var(--primary-rgb), 0.3);
            margin-bottom: 24px;
        }
        [data-theme="light"] .brand-divider { background: rgba(255,255,255,0.3); }

        .brand-tagline {
            font-size: 14px; color: var(--brand-sub);
            text-align: center; line-height: 1.8;
            margin-bottom: 40px;
        }
        [data-theme="light"] .brand-tagline { color: rgba(255,255,255,0.75); }

        .sell-list { display: flex; flex-direction: column; gap: 10px; width: 100%; }
        .sell-item {
            display: flex; align-items: center; gap: 14px;
            padding: 14px 18px;
            background: var(--sell-bg);
            border: 1px solid var(--sell-border);
            border-radius: 10px;
            transition: all 0.2s;
        }
        .sell-item:hover {
            background: var(--sell-hover);
            transform: translateX(3px);
        }
        .sell-icon {
            width: 36px; height: 36px; flex-shrink: 0;
            border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
        }
        .sell-icon-1 { background: var(--sell-icon1); color: var(--sell-ic1); }
        .sell-icon-2 { background: var(--sell-icon2); color: var(--sell-ic2); }
        .sell-icon-3 { background: var(--sell-icon3); color: var(--sell-ic3); }
        .sell-title {
            font-size: 13px; font-weight: 600;
            color: var(--brand-title); margin-bottom: 1px;
        }
        .sell-desc {
            font-size: 11.5px; color: var(--brand-sub);
        }
        [data-theme="light"] .sell-title { color: rgba(255,255,255,0.95); }
        [data-theme="light"] .sell-desc  { color: rgba(255,255,255,0.6); }

        /* ══ Right Card ══ */
        .form-side {
            flex: 0 0 480px;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; z-index: 2;
        }
        .login-card {
            position: relative;
            width: 100%; max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 44px 36px 32px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            opacity: 0; transform: translateY(16px);
            animation: fadeIn 0.6s ease-out 0.35s forwards;
        }
        .card-glow {
            position: absolute;
            top: -1px; left: 20%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-glow), transparent);
        }
        .card-head { margin-bottom: 30px; }
        .card-title { font-size: 24px; font-weight: 700; color: var(--text-1); margin: 0 0 6px; }
        .card-sub { font-size: 13.5px; color: var(--text-2); margin: 0; }

        .error-msg {
            background: var(--error-bg); border: 1px solid var(--error-border);
            color: var(--error-text); padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
            display: none; align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }

        .form-group { margin-bottom: 18px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-3); font-size: 14px; pointer-events: none; transition: color 0.2s;
        }
        .form-input {
            width: 100%; height: 44px; padding: 0 14px 0 40px;
            border: 1px solid var(--border-input); border-radius: 10px;
            font-size: 14px; color: var(--text-1);
            background: var(--bg-input); transition: all 0.2s;
            outline: none; font-family: inherit;
        }
        .form-input:hover { background: var(--bg-input-hover); }
        .form-input:focus { border-color: var(--border-input-focus); box-shadow: var(--shadow-input-focus); background: var(--bg-input-hover); }
        .input-wrap:focus-within .input-icon { color: var(--primary); }
        .form-input::placeholder { color: var(--text-placeholder); }

        .pwd-toggle {
            position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-3);
            cursor: pointer; padding: 4px; font-size: 14px; transition: color 0.2s;
        }
        .pwd-toggle:hover { color: var(--primary); }

        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-row .input-wrap { flex: 1; }
        .captcha-box {
            width: 120px; height: 44px; flex-shrink: 0;
            border-radius: 10px; cursor: pointer;
            border: 1px solid var(--border-input);
            transition: all 0.2s; overflow: hidden; position: relative;
        }
        .captcha-box canvas { width: 100%; height: 100%; display: block; }
        .captcha-box:hover { border-color: rgba(var(--primary-rgb), 0.35); transform: scale(1.02); }
        .captcha-box:active { transform: scale(0.98); }
        .captcha-box:hover::after {
            content: '刷新'; position: absolute; inset: 0;
            background: rgba(0,0,0,0.4); color: #fff; font-size: 11px;
            display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }

        .ip-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 9px 14px; background: var(--bg-ip);
            border: 1px solid var(--ip-border); border-radius: 8px; margin-bottom: 22px;
        }
        .ip-bar i { color: var(--text-3); font-size: 13px; }
        .ip-bar span { font-size: 12.5px; color: var(--text-2); }
        .ip-addr { color: var(--text-1); font-weight: 500; font-family: 'SF Mono','Monaco','Consolas',monospace; font-size: 12.5px; }

        .btn-login {
            width: 100%; height: 46px;
            background: var(--btn-gradient);
            background-size: 200% 200%; background-position: 0% 50%;
            border: none; border-radius: 10px;
            color: white; font-size: 15px; font-weight: 600;
            letter-spacing: 4px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: var(--shadow-btn); font-family: inherit;
        }
        .btn-login:hover:not(.loading) { background-position: 100% 50%; box-shadow: var(--shadow-btn-hover); transform: translateY(-1px); }
        .btn-login:active:not(.loading) { transform: translateY(0); }
        .btn-login.loading { pointer-events: none; opacity: 0.8; }
        .btn-login .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card-footer { text-align: center; margin-top: 24px; font-size: 11px; color: var(--footer-color); letter-spacing: 0.3px; }

        /* Responsive */
        @media (max-width: 960px) {
            .brand { padding: 32px; }
            .form-side { flex: 0 0 440px; padding: 32px; }
        }
        @media (max-width: 800px) {
            .page { flex-direction: column; }
            .brand { position: absolute; inset: 0; padding: 0; }
            .brand-inner {
                position: absolute; top: 3vh; left: 50%;
                transform: translateX(-50%) !important;
                opacity: 0.2 !important; max-width: 200px;
            }
            .brand-name { font-size: 20px; }
            .brand-tagline, .sell-list { display: none; }
            .form-side { flex: 1; width: 100%; align-items: flex-end; padding: 24px 24px 48px; }
            .login-card { max-width: 420px; margin: 0 auto; }
            [data-theme="light"] .brand { background: none; }
        }
        @media (max-width: 480px) {
            .form-side { padding: 16px 16px 32px; }
            .login-card { padding: 32px 24px 28px; }
            .brand-inner { display: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .bg-glow { animation: none !important; }
            .brand-inner, .login-card { animation: none !important; opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="page">
        <div class="bg" aria-hidden="true">
            <div class="bg-noise"></div>
            <div class="bg-glow bg-g1"></div>
            <div class="bg-glow bg-g2"></div>
        </div>

        <!-- Left -->
        <div class="brand">
            <div class="brand-inner">
                <div class="brand-logo">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                        <rect x="3" y="3" width="7" height="7" rx="2" fill="currentColor" style="color: var(--brand-title)"/>
                        <rect x="14" y="3" width="7" height="7" rx="2" fill="currentColor" opacity="0.7" style="color: var(--brand-title)"/>
                        <rect x="3" y="14" width="7" height="7" rx="2" fill="currentColor" opacity="0.7" style="color: var(--brand-title)"/>
                        <rect x="14" y="14" width="7" height="7" rx="2" fill="currentColor" opacity="0.5" style="color: var(--brand-title)"/>
                    </svg>
                </div>
                <h1 class="brand-name">活动中心</h1>
                <p class="brand-en">Campaign Center</p>
                <div class="brand-divider"></div>
                <p class="brand-tagline">
                    一站式活动营销管理平台<br>
                    高效配置 · 精准获客 · 数据驱动
                </p>
                <div class="sell-list">
                    <div class="sell-item">
                        <div class="sell-icon sell-icon-1"><i class="fas fa-bolt"></i></div>
                        <div>
                            <div class="sell-title">高效活动配置</div>
                            <div class="sell-desc">多种玩法模板，分钟级快速上线</div>
                        </div>
                    </div>
                    <div class="sell-item">
                        <div class="sell-icon sell-icon-2"><i class="fas fa-users"></i></div>
                        <div>
                            <div class="sell-title">精准用户触达</div>
                            <div class="sell-desc">智能分群投放，最大化活动效果</div>
                        </div>
                    </div>
                    <div class="sell-item">
                        <div class="sell-icon sell-icon-3"><i class="fas fa-chart-line"></i></div>
                        <div>
                            <div class="sell-title">全链路数据分析</div>
                            <div class="sell-desc">实时监控转化漏斗，持续优化ROI</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right -->
        <div class="form-side">
            <div class="login-card">
                <div class="card-glow"></div>
                <div class="card-head">
                    <h1 class="card-title">账号登录</h1>
                    <p class="card-sub">请输入管理员凭证登录后台</p>
                </div>

                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText"></span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">邮箱地址</label>
                        <div class="input-wrap">
                            <input type="email" class="form-input" id="email" placeholder="请输入邮箱地址" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">登录密码</label>
                        <div class="input-wrap">
                            <input type="password" class="form-input" id="password" placeholder="请输入登录密码" required>
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="pwd-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="captcha-row">
                            <div class="input-wrap">
                                <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" maxlength="4" required autocomplete="off">
                                <i class="fas fa-shield-alt input-icon"></i>
                            </div>
                            <div class="captcha-box" onclick="generateCaptcha()" title="点击刷新验证码">
                                <canvas id="captchaCanvas" width="120" height="44"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="ip-bar">
                        <i class="fas fa-globe"></i>
                        <span>当前IP：<span class="ip-addr" id="currentIP">获取中...</span></span>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn"><span>登 录</span></button>
                </form>
                <div class="card-footer">© 2026 活动中心 · Campaign Center</div>
            </div>
        </div>
    </div>

    <script>
        let captchaCode = '';

        function getTheme() {
            const s = localStorage.getItem('ac-theme');
            if (s) return s;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ac-theme', t);
            document.getElementById('themeIcon').className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            generateCaptcha();
        }
        function toggleTheme() {
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            const dk = document.documentElement.getAttribute('data-theme') === 'dark';
            captchaCode = '';
            canvas.width = 120; canvas.height = 44;
            ctx.fillStyle = dk ? '#0d1526' : '#f0f2f5';
            ctx.fillRect(0, 0, 120, 44);
            for (let i = 0; i < 4; i++) {
                const ch = chars[Math.floor(Math.random() * chars.length)];
                captchaCode += ch;
                ctx.font = `${600 + Math.random() * 100} ${18 + Math.random() * 3}px 'Plus Jakarta Sans', sans-serif`;
                ctx.fillStyle = dk ? `hsl(${220 + Math.random() * 40}, 60%, 65%)` : `hsl(${220 + Math.random() * 40}, 45%, 42%)`;
                ctx.save();
                ctx.translate(14 + i * 26, 27 + (Math.random() - 0.5) * 5);
                ctx.rotate((Math.random() - 0.5) * 0.35);
                ctx.fillText(ch, 0, 0);
                ctx.restore();
            }
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random() * 120, Math.random() * 44);
                ctx.lineTo(Math.random() * 120, Math.random() * 44);
                ctx.strokeStyle = dk ? 'rgba(79,110,247,0.08)' : 'rgba(0,0,0,0.05)';
                ctx.lineWidth = 0.5; ctx.stroke();
            }
            for (let i = 0; i < 24; i++) {
                ctx.fillStyle = dk ? 'rgba(96,165,250,0.1)' : 'rgba(0,0,0,0.06)';
                ctx.fillRect(Math.random() * 120, Math.random() * 44, 1.5, 1.5);
            }
        }

        function fetchIP() {
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => { document.getElementById('currentIP').textContent = d.ip; })
                .catch(() => { document.getElementById('currentIP').textContent = '无法获取'; });
        }

        function togglePassword() {
            const p = document.getElementById('password'), ic = document.getElementById('toggleIcon');
            if (p.type === 'password') { p.type = 'text'; ic.classList.replace('fa-eye', 'fa-eye-slash'); }
            else { p.type = 'password'; ic.classList.replace('fa-eye-slash', 'fa-eye'); }
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            const errT = document.getElementById('errorText');
            const ci = document.getElementById('captcha').value;
            err.classList.remove('show');
            if (ci.toLowerCase() !== captchaCode.toLowerCase()) {
                errT.textContent = '验证码错误，请重新输入';
                err.classList.add('show');
                generateCaptcha();
                document.getElementById('captcha').value = '';
                document.getElementById('captcha').focus();
                return;
            }
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner"></div><span>登录中...</span>';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
        }

        applyTheme(getTheme());
        fetchIP();
        document.getElementById('email').focus();
    </script>
</body>
</html>
