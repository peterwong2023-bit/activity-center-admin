<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 活动中心</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        /* ══ Dark Theme ══ */
        :root, [data-theme="dark"] {
            --bg-page: #060e1f;
            --bg-card: rgba(13, 21, 42, 0.75);
            --bg-input: rgba(15, 23, 42, 0.6);
            --bg-input-hover: rgba(15, 23, 42, 0.8);
            --bg-ip: rgba(15, 23, 42, 0.5);
            --text-1: #f1f5f9;
            --text-2: rgba(148, 163, 184, 0.7);
            --text-3: rgba(148, 163, 184, 0.4);
            --text-placeholder: rgba(148, 163, 184, 0.3);
            --primary: #4f6ef7;
            --primary-rgb: 79, 110, 247;
            --gold: #fbbf24;
            --gold-rgb: 251, 191, 36;
            --orange: #f97316;
            --orange-rgb: 249, 115, 22;
            --pink: #ec4899;
            --pink-rgb: 236, 72, 153;
            --border-card: rgba(79, 110, 247, 0.1);
            --border-input: rgba(79, 110, 247, 0.15);
            --border-input-focus: rgba(79, 110, 247, 0.5);
            --shadow-card: 0 24px 64px rgba(0, 0, 0, 0.4);
            --shadow-btn: 0 4px 20px rgba(79, 110, 247, 0.25);
            --shadow-btn-hover: 0 8px 32px rgba(79, 110, 247, 0.4);
            --shadow-input-focus: 0 0 0 3px rgba(79, 110, 247, 0.08);
            --btn-gradient: linear-gradient(135deg, #3b5bdb 0%, #4f6ef7 50%, #667eea 100%);
            --card-glow-color: rgba(79, 110, 247, 0.5);
            --card-backdrop: blur(40px);
            --ip-border: rgba(79, 110, 247, 0.1);
            --footer-color: rgba(148, 163, 184, 0.3);
            --toggle-bg: rgba(255, 255, 255, 0.06);
            --toggle-hover: rgba(255, 255, 255, 0.12);
            --toggle-color: rgba(148, 163, 184, 0.6);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.2);
            --error-text: #f87171;
            --brand-title: #f1f5f9;
            --brand-sub: rgba(148, 163, 184, 0.7);
            --brand-slogan: rgba(148, 163, 184, 0.5);
            --noise-opacity: 0.03;
            --captcha-bg: #0d1526;
            --sell-bg: rgba(79, 110, 247, 0.04);
            --sell-border: rgba(79, 110, 247, 0.08);
            --sell-icon-bg: rgba(251, 191, 36, 0.1);
        }

        /* ══ Light Theme ══ */
        [data-theme="light"] {
            --bg-page: #f0f2f5;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --bg-input-hover: #f1f5f9;
            --bg-ip: #f8fafc;
            --text-1: #1e293b;
            --text-2: #64748b;
            --text-3: #94a3b8;
            --text-placeholder: #cbd5e1;
            --border-card: #e2e8f0;
            --border-input: #e2e8f0;
            --border-input-focus: #4f6ef7;
            --shadow-card: 0 16px 48px rgba(0, 0, 0, 0.08);
            --shadow-btn: 0 4px 16px rgba(79, 110, 247, 0.3);
            --shadow-btn-hover: 0 8px 24px rgba(79, 110, 247, 0.4);
            --shadow-input-focus: 0 0 0 3px rgba(79, 110, 247, 0.1);
            --btn-gradient: linear-gradient(135deg, #667eea 0%, #4f6ef7 50%, #3b5bdb 100%);
            --card-glow-color: transparent;
            --card-backdrop: none;
            --ip-border: #e2e8f0;
            --footer-color: #94a3b8;
            --toggle-bg: rgba(0, 0, 0, 0.04);
            --toggle-hover: rgba(0, 0, 0, 0.08);
            --toggle-color: #64748b;
            --error-bg: #fef2f2;
            --error-border: #fecaca;
            --error-text: #dc2626;
            --brand-title: #ffffff;
            --brand-sub: rgba(255, 255, 255, 0.85);
            --brand-slogan: rgba(255, 255, 255, 0.6);
            --noise-opacity: 0;
            --captcha-bg: #f0f2f5;
            --sell-bg: rgba(255, 255, 255, 0.12);
            --sell-border: rgba(255, 255, 255, 0.18);
            --sell-icon-bg: rgba(255, 255, 255, 0.2);
        }

        body {
            font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-page);
            min-height: 100vh; overflow: hidden;
        }
        .page { position: fixed; inset: 0; display: flex; overflow: hidden; }

        /* ══ Background ══ */
        .bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
        .bg-noise {
            position: absolute; inset: 0; opacity: var(--noise-opacity);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .bg-glow {
            position: absolute; border-radius: 50%; filter: blur(100px);
            animation: glowPulse 10s ease-in-out infinite;
        }
        .bg-g1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(var(--primary-rgb),0.12) 0%, transparent 70%); top: -10%; left: -5%; }
        .bg-g2 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(var(--gold-rgb),0.06) 0%, transparent 70%); bottom: -5%; right: 5%; animation-delay: -3s; }
        .bg-g3 { width: 350px; height: 350px; background: radial-gradient(circle, rgba(var(--pink-rgb),0.05) 0%, transparent 70%); top: 40%; left: 35%; animation-delay: -6s; }
        [data-theme="light"] .bg-g1 { opacity: 0; }
        [data-theme="light"] .bg-g2 { opacity: 0; }
        [data-theme="light"] .bg-g3 { opacity: 0; }
        @keyframes glowPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } }

        /* Floating emojis */
        .floats { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .fl {
            position: absolute; font-size: var(--sz);
            animation: floatUp var(--dur) ease-in-out infinite;
            animation-delay: var(--del);
            opacity: 0;
        }
        [data-theme="dark"] .fl { filter: saturate(0.8); }
        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg) scale(0.5); opacity: 0; }
            10%  { opacity: var(--op); }
            50%  { transform: translateY(calc(var(--travel) * -0.5)) rotate(15deg) scale(1); opacity: var(--op); }
            90%  { opacity: var(--op); }
            100% { transform: translateY(var(--travel)) rotate(-10deg) scale(0.5); opacity: 0; }
        }

        /* Confetti particles */
        .confetti { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
        .conf {
            position: absolute; width: var(--w); height: var(--h);
            background: var(--c); border-radius: 1px;
            animation: confettiFall var(--dur) linear infinite;
            animation-delay: var(--del);
            opacity: 0;
        }
        [data-theme="light"] .conf { opacity: 0 !important; }
        @keyframes confettiFall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 0; }
            10%  { opacity: var(--op); }
            90%  { opacity: var(--op); }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        /* ══ Theme Toggle ══ */
        .theme-toggle {
            position: fixed; top: 20px; right: 24px; z-index: 100;
            width: 40px; height: 40px; border-radius: 10px;
            background: var(--toggle-bg); border: none;
            color: var(--toggle-color); font-size: 16px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }
        .theme-toggle:hover { background: var(--toggle-hover); color: var(--text-1); }

        /* ══ Left Brand ══ */
        .brand {
            flex: 1 1 0; min-width: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 48px; z-index: 1; position: relative;
        }
        [data-theme="light"] .brand {
            background: linear-gradient(135deg, #667eea 0%, #4f6ef7 40%, #7c3aed 100%);
        }
        [data-theme="light"] .brand::before {
            content: ''; position: absolute;
            top: -100px; right: -100px;
            width: 300px; height: 300px; border-radius: 50%;
            background: rgba(255,255,255,0.08);
        }
        [data-theme="light"] .brand::after {
            content: ''; position: absolute;
            bottom: -80px; left: -60px;
            width: 240px; height: 240px; border-radius: 50%;
            background: rgba(255,255,255,0.05);
        }

        .brand-inner {
            display: flex; flex-direction: column; align-items: center;
            max-width: 420px; width: 100%; position: relative; z-index: 1;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.8s ease-out 0.2s forwards;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        /* Big emoji hero */
        .hero-emoji {
            font-size: 72px; margin-bottom: 24px;
            animation: emojiPop 2s ease-in-out infinite;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));
        }
        @keyframes emojiPop {
            0%, 100% { transform: scale(1) rotate(-3deg); }
            50%      { transform: scale(1.08) rotate(3deg); }
        }

        .hero-title {
            font-size: 34px; font-weight: 800;
            color: var(--brand-title);
            text-align: center; line-height: 1.3;
            margin-bottom: 12px;
        }
        .hero-highlight {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        [data-theme="light"] .hero-highlight {
            background: linear-gradient(135deg, #fcd34d, #ffffff);
            -webkit-background-clip: text; background-clip: text;
        }

        .hero-slogan {
            font-size: 15px; color: var(--brand-sub);
            text-align: center; line-height: 1.7;
            margin-bottom: 36px; max-width: 320px;
        }

        /* Selling points */
        .sell-points { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .sell-item {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 20px;
            background: var(--sell-bg);
            border: 1px solid var(--sell-border);
            border-radius: 12px;
            transition: all 0.3s;
        }
        .sell-item:hover {
            transform: translateX(4px);
            border-color: rgba(var(--gold-rgb), 0.2);
        }
        .sell-icon {
            width: 40px; height: 40px; flex-shrink: 0;
            border-radius: 10px;
            background: var(--sell-icon-bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .sell-text-title {
            font-size: 14px; font-weight: 600;
            color: var(--brand-title); margin-bottom: 2px;
        }
        .sell-text-desc {
            font-size: 12px; color: var(--brand-slogan);
        }

        /* ══ Right Card ══ */
        .form-side {
            flex: 0 0 480px;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; z-index: 2;
        }
        .login-card {
            position: relative;
            width: 100%; max-width: 420px;
            background: var(--bg-card);
            backdrop-filter: var(--card-backdrop);
            -webkit-backdrop-filter: var(--card-backdrop);
            border: 1px solid var(--border-card);
            border-radius: 16px;
            padding: 44px 36px 32px;
            box-shadow: var(--shadow-card);
            overflow: hidden;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.6s ease-out 0.3s forwards;
        }
        .card-glow {
            position: absolute;
            top: -1px; left: 20%; right: 20%; height: 1px;
            background: linear-gradient(90deg, transparent, var(--card-glow-color), transparent);
        }
        .card-head { margin-bottom: 32px; }
        .card-title {
            font-size: 26px; font-weight: 700;
            color: var(--text-1); margin: 0 0 6px;
        }
        .card-sub { font-size: 13.5px; color: var(--text-2); margin: 0; }

        /* Error */
        .error-msg {
            background: var(--error-bg); border: 1px solid var(--error-border);
            color: var(--error-text); padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px;
            display: none; align-items: center; gap: 8px;
        }
        .error-msg.show { display: flex; }

        /* Form */
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 13px; font-weight: 500; color: var(--text-2); margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-icon {
            position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
            color: var(--text-3); font-size: 15px; pointer-events: none; transition: color 0.2s;
        }
        .form-input {
            width: 100%; height: 46px; padding: 0 14px 0 42px;
            border: 1px solid var(--border-input); border-radius: 10px;
            font-size: 14px; color: var(--text-1);
            background: var(--bg-input); transition: all 0.2s;
            outline: none; font-family: inherit;
        }
        .form-input:hover { background: var(--bg-input-hover); }
        .form-input:focus { border-color: var(--border-input-focus); box-shadow: var(--shadow-input-focus); background: var(--bg-input-hover); }
        .input-wrap:focus-within .input-icon { color: var(--primary); }
        .form-input::placeholder { color: var(--text-placeholder); }

        .pwd-toggle {
            position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: var(--text-3);
            cursor: pointer; padding: 4px; font-size: 15px; transition: color 0.2s;
        }
        .pwd-toggle:hover { color: var(--primary); }

        .captcha-row { display: flex; gap: 10px; align-items: center; }
        .captcha-row .input-wrap { flex: 1; }
        .captcha-box {
            width: 120px; height: 46px; flex-shrink: 0;
            border-radius: 10px; cursor: pointer;
            border: 1px solid var(--border-input);
            transition: all 0.2s; overflow: hidden; position: relative;
        }
        .captcha-box canvas { width: 100%; height: 100%; display: block; }
        .captcha-box:hover { border-color: rgba(var(--primary-rgb), 0.35); transform: scale(1.02); }
        .captcha-box:active { transform: scale(0.98); }
        .captcha-box:hover::after {
            content: '刷新'; position: absolute; inset: 0;
            background: rgba(0,0,0,0.4); color: #fff; font-size: 11px;
            display: flex; align-items: center; justify-content: center; border-radius: 10px;
        }

        .ip-bar {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px; background: var(--bg-ip);
            border: 1px solid var(--ip-border); border-radius: 8px; margin-bottom: 24px;
        }
        .ip-bar i { color: var(--text-3); font-size: 14px; }
        .ip-bar span { font-size: 13px; color: var(--text-2); }
        .ip-addr { color: var(--text-1); font-weight: 500; font-family: 'SF Mono','Monaco','Consolas',monospace; }

        .btn-login {
            width: 100%; height: 48px;
            background: var(--btn-gradient);
            background-size: 200% 200%; background-position: 0% 50%;
            border: none; border-radius: 10px;
            color: white; font-size: 15px; font-weight: 600;
            letter-spacing: 4px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: var(--shadow-btn); font-family: inherit;
        }
        .btn-login:hover:not(.loading) { background-position: 100% 50%; box-shadow: var(--shadow-btn-hover); transform: translateY(-1px); }
        .btn-login:active:not(.loading) { transform: translateY(0); }
        .btn-login.loading { pointer-events: none; opacity: 0.8; }
        .btn-login .spinner {
            width: 18px; height: 18px;
            border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card-footer { text-align: center; margin-top: 28px; font-size: 11px; color: var(--footer-color); letter-spacing: 0.3px; }

        /* ══ Responsive ══ */
        @media (max-width: 960px) {
            .brand { padding: 32px; }
            .form-side { flex: 0 0 440px; padding: 32px; }
            .hero-title { font-size: 28px; }
            .hero-emoji { font-size: 56px; }
        }
        @media (max-width: 800px) {
            .page { flex-direction: column; }
            .brand { position: absolute; inset: 0; padding: 0; }
            .brand-inner {
                position: absolute; top: 2vh; left: 50%;
                transform: translateX(-50%) !important;
                opacity: 0.25 !important; max-width: 200px;
            }
            .hero-emoji { font-size: 40px; margin-bottom: 12px; }
            .hero-title { font-size: 18px; }
            .hero-slogan, .sell-points { display: none; }
            .form-side { flex: 1; width: 100%; align-items: flex-end; padding: 24px 24px 48px; }
            .login-card { max-width: 420px; margin: 0 auto; }
            [data-theme="light"] .brand { background: none; }
        }
        @media (max-width: 480px) {
            .form-side { padding: 16px 16px 32px; }
            .login-card { padding: 36px 24px 28px; border-radius: 14px; }
            .card-title { font-size: 22px; }
            .brand-inner { display: none; }
        }
        @media (prefers-reduced-motion: reduce) {
            .bg-glow, .fl, .conf, .hero-emoji { animation: none !important; }
            .brand-inner, .login-card { animation: none !important; opacity: 1 !important; transform: none !important; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <div class="page">
        <div class="bg" aria-hidden="true">
            <div class="bg-noise"></div>
            <div class="bg-glow bg-g1"></div>
            <div class="bg-glow bg-g2"></div>
            <div class="bg-glow bg-g3"></div>
            <div class="floats" id="floats"></div>
            <div class="confetti" id="confetti"></div>
        </div>

        <!-- Left Brand -->
        <div class="brand">
            <div class="brand-inner">
                <div class="hero-emoji">🚀</div>
                <h1 class="hero-title">让每一场活动<br>成为<span class="hero-highlight">增长引擎</span></h1>
                <p class="hero-slogan">
                    一站式活动营销平台，助力商户拉新获客<br>
                    轻松配置、精准触达、数据驱动增长
                </p>
                <div class="sell-points">
                    <div class="sell-item">
                        <div class="sell-icon">🎁</div>
                        <div>
                            <div class="sell-text-title">丰富活动玩法</div>
                            <div class="sell-text-desc">签到、抽奖、红包雨…一键配置上线</div>
                        </div>
                    </div>
                    <div class="sell-item">
                        <div class="sell-icon">📈</div>
                        <div>
                            <div class="sell-text-title">提升用户活跃</div>
                            <div class="sell-text-desc">精细化运营，让每一分预算产出最大价值</div>
                        </div>
                    </div>
                    <div class="sell-item">
                        <div class="sell-icon">💰</div>
                        <div>
                            <div class="sell-text-title">驱动收入增长</div>
                            <div class="sell-text-desc">活动转化、充值引导，收入提升看得见</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Right Login -->
        <div class="form-side">
            <div class="login-card">
                <div class="card-glow"></div>
                <div class="card-head">
                    <h1 class="card-title">欢迎回来 👋</h1>
                    <p class="card-sub">登录活动中心管理后台</p>
                </div>

                <div class="error-msg" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">邮箱或密码错误</span>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
                    <div class="form-group">
                        <label class="form-label">邮箱地址</label>
                        <div class="input-wrap">
                            <input type="email" class="form-input" id="email" placeholder="请输入邮箱地址" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">登录密码</label>
                        <div class="input-wrap">
                            <input type="password" class="form-input" id="password" placeholder="请输入登录密码" required>
                            <i class="fas fa-lock input-icon"></i>
                            <button type="button" class="pwd-toggle" onclick="togglePassword()">
                                <i class="fas fa-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">验证码</label>
                        <div class="captcha-row">
                            <div class="input-wrap">
                                <input type="text" class="form-input" id="captcha" placeholder="请输入验证码" maxlength="4" required autocomplete="off">
                                <i class="fas fa-shield-alt input-icon"></i>
                            </div>
                            <div class="captcha-box" onclick="generateCaptcha()" title="点击刷新验证码">
                                <canvas id="captchaCanvas" width="120" height="46"></canvas>
                            </div>
                        </div>
                    </div>
                    <div class="ip-bar">
                        <i class="fas fa-globe"></i>
                        <span>当前IP：<span class="ip-addr" id="currentIP">获取中...</span></span>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn"><span>登 录</span></button>
                </form>
                <div class="card-footer">© 2026 活动中心 · Campaign Center</div>
            </div>
        </div>
    </div>

    <script>
        let captchaCode = '';

        /* Theme */
        function getTheme() {
            const s = localStorage.getItem('ac-theme');
            if (s) return s;
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        function applyTheme(t) {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('ac-theme', t);
            document.getElementById('themeIcon').className = t === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            generateCaptcha();
        }
        function toggleTheme() {
            applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
        }

        /* Floating emojis */
        function createFloats() {
            const el = document.getElementById('floats');
            const emojis = ['🎁','💰','🏆','⭐','🎯','💎','🔥','🎪','🎲','🎮','🎰','📊','🧧','🪙','🎊','🎉'];
            for (let i = 0; i < 16; i++) {
                const d = document.createElement('div');
                d.className = 'fl';
                d.textContent = emojis[i % emojis.length];
                const sz = 20 + Math.random() * 18;
                d.style.cssText = `
                    left: ${Math.random() * 95}%;
                    top: ${10 + Math.random() * 80}%;
                    --sz: ${sz}px;
                    --dur: ${16 + Math.random() * 14}s;
                    --del: ${-Math.random() * 20}s;
                    --travel: ${40 + Math.random() * 80}px;
                    --op: ${0.15 + Math.random() * 0.15};
                `;
                el.appendChild(d);
            }
        }

        /* Confetti (dark mode only) */
        function createConfetti() {
            const el = document.getElementById('confetti');
            const colors = [
                'rgba(79,110,247,0.4)', 'rgba(251,191,36,0.4)', 'rgba(236,72,153,0.3)',
                'rgba(34,211,238,0.3)', 'rgba(167,139,250,0.35)', 'rgba(249,115,22,0.35)'
            ];
            for (let i = 0; i < 24; i++) {
                const d = document.createElement('div');
                d.className = 'conf';
                d.style.cssText = `
                    left: ${Math.random() * 100}%;
                    --w: ${3 + Math.random() * 4}px;
                    --h: ${6 + Math.random() * 8}px;
                    --c: ${colors[Math.floor(Math.random() * colors.length)]};
                    --dur: ${10 + Math.random() * 15}s;
                    --del: ${-Math.random() * 20}s;
                    --op: ${0.3 + Math.random() * 0.4};
                `;
                el.appendChild(d);
            }
        }

        /* Captcha */
        function generateCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const chars = 'ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789';
            const dk = document.documentElement.getAttribute('data-theme') === 'dark';
            captchaCode = '';
            canvas.width = 120; canvas.height = 46;
            ctx.fillStyle = dk ? '#0d1526' : '#f0f2f5';
            ctx.fillRect(0, 0, 120, 46);
            for (let i = 0; i < 4; i++) {
                const ch = chars[Math.floor(Math.random() * chars.length)];
                captchaCode += ch;
                ctx.font = `${600+Math.random()*100} ${19+Math.random()*3}px 'Plus Jakarta Sans',sans-serif`;
                ctx.fillStyle = dk ? `hsl(${220+Math.random()*60},70%,65%)` : `hsl(${220+Math.random()*60},50%,40%)`;
                ctx.save();
                ctx.translate(14+i*26, 28+(Math.random()-0.5)*6);
                ctx.rotate((Math.random()-0.5)*0.4);
                ctx.fillText(ch, 0, 0);
                ctx.restore();
            }
            for (let i = 0; i < 3; i++) {
                ctx.beginPath();
                ctx.moveTo(Math.random()*120, Math.random()*46);
                ctx.lineTo(Math.random()*120, Math.random()*46);
                ctx.strokeStyle = dk ? 'rgba(79,110,247,0.1)' : 'rgba(0,0,0,0.06)';
                ctx.lineWidth = 0.5; ctx.stroke();
            }
            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = dk ? 'rgba(96,165,250,0.12)' : 'rgba(0,0,0,0.08)';
                ctx.fillRect(Math.random()*120, Math.random()*46, 1.5, 1.5);
            }
        }

        function fetchIP() {
            fetch('https://api.ipify.org?format=json')
                .then(r => r.json())
                .then(d => { document.getElementById('currentIP').textContent = d.ip; })
                .catch(() => { document.getElementById('currentIP').textContent = '无法获取'; });
        }

        function togglePassword() {
            const p = document.getElementById('password'), ic = document.getElementById('toggleIcon');
            if (p.type === 'password') { p.type = 'text'; ic.classList.replace('fa-eye','fa-eye-slash'); }
            else { p.type = 'password'; ic.classList.replace('fa-eye-slash','fa-eye'); }
        }

        function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const err = document.getElementById('errorMsg');
            const errT = document.getElementById('errorText');
            const ci = document.getElementById('captcha').value;
            err.classList.remove('show');
            if (ci.toLowerCase() !== captchaCode.toLowerCase()) {
                errT.textContent = '验证码错误，请重新输入';
                err.classList.add('show');
                generateCaptcha();
                document.getElementById('captcha').value = '';
                document.getElementById('captcha').focus();
                return;
            }
            btn.classList.add('loading');
            btn.innerHTML = '<div class="spinner"></div><span>登录中...</span>';
            setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
        }

        applyTheme(getTheme());
        createFloats();
        createConfetti();
        fetchIP();
        document.getElementById('email').focus();
    </script>
</body>
</html>
